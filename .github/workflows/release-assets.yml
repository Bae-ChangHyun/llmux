name: Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v2.0.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ref.outputs.tag }}
    steps:
      - id: ref
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build Python wheel
        run: python -m build --wheel

      - name: Build installer payload
        run: ./packaging/build-release-assets.sh "${{ needs.prepare.outputs.tag }}" "${{ matrix.platform }}"

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        run: |
          hdiutil create \
            -volname "llmux ${{ needs.prepare.outputs.tag }}" \
            -srcfolder dist/release/dmg-root \
            -ov \
            -format UDZO \
            "dist/release/llmux-${{ needs.prepare.outputs.tag }}-${{ matrix.platform }}.dmg"

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p upload
          find dist/release -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.run' -o -name '*.tar.gz' \) -print -exec cp {} upload/ \;
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            cp dist/*.whl upload/
          fi
          ls -lh upload

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}
          path: upload/*
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          ls -lh release-assets
          (cd release-assets && sha256sum * > "llmux-${TAG}-checksums.txt")

          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TAG" \
              --generate-notes \
              --latest
          fi

          gh release upload "$TAG" release-assets/* --repo "$REPO" --clobber
