# llama-server 플래그 (scripts/render-override.py 가 CLI 인자로 변환)
# 키 이름은 llama-server 의 `--` 롱플래그 그대로 사용.

# 필수: GGUF 파일명 (models/ 디렉토리 기준 상대경로)
model-file: Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf

# 컨텍스트 / 배치
ctx-size: 32768
n-gpu-layers: 99

# KV 캐시 정밀도 (bf16 이 정확도-메모리 균형 좋음)
cache-type-k: bf16
cache-type-v: bf16

# 샘플링 (Qwen3.6 권장값)
temp: 0.6
top-p: 0.95
top-k: 20

# 모델 별칭 (/v1/models 에서 노출)
alias: qwen3.6-35b-a3b

# Jinja chat template 활성화 (Qwen3.6 필수)
jinja: true

# ─── MoE expert CPU offload (A3B 모델 핵심) ───
# ffn_*_exps 로 매칭되는 expert 가중치만 CPU로 내림.
# active 3B만 VRAM에 유지하여 16GB GPU에서 35B 모델 서빙 가능.
override-tensors:
  - ".ffn_.*_exps.=CPU"

# ─── 선택 ───
# API key (comma-separated)
# api-key: sk-mysecret

# 추가 인자 (render 스크립트가 verbatim 으로 붙임)
extra-args: []
