# DeepSeek-R1-Distill-Llama-8B (Q4_K_M) — 추론/thinking 특화 distill.

model-file: DeepSeek-R1-Distill-Llama-8B-Q4_K_M.gguf

# Llama 3.1 8B 베이스 (128K). 추론 체인 길이 고려해 32K 기본.
ctx-size: 32768
n-gpu-layers: 99

cache-type-k: bf16
cache-type-v: bf16

# DeepSeek-R1 권장 샘플링 (낮은 temp로 일관성)
temp: 0.6
top-p: 0.95
top-k: 20

alias: deepseek-r1-distill-8b

# DeepSeek-R1 chat template 필수 (jinja)
jinja: true

# thinking 출력을 위한 reasoning parser
reasoning-format: deepseek

flash-attn: true

extra-args: []
