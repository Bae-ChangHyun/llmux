[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vllm-compose-tui"
version = "0.1.0"
description = "Textual TUI for vLLM Container Management"
requires-python = ">=3.10"
dependencies = [
    "textual>=1.0.0",
    "pyyaml>=6.0",
    "hf-mem>=0.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["tui"]

[project.scripts]
vllm-compose = "tui.app:main"
