# Development compose file - uses vLLM built from source
# Usage:
#   1. Launch the TUI: uv run vllm-compose
#   2. Choose "Dev Build" when starting a profile

services:
  vllm:
    extends:
      file: docker-compose.yaml
      service: vllm
    image: vllm-dev:${VLLM_DEV_TAG:-${VLLM_BRANCH:-main}}
